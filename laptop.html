<!DOCTYPE html>
<html>
<body style="background:#000; display:flex; justify-content:center; align-items:center; height:100vh;">
    <video id="vid" style="width: 100vw; height: 100vh; object-fit: cover;" controls muted autoplay loop>
        <source src="1000414425.mp4.mp4" type="video/mp4"></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR CONFIG HERE
        const firebaseConfig = { 
            apiKey: "AIzaSyAw3GOqElSQRVXODbcCduUAtn7LNu00J7w",
            databaseURL: "https://video-remote-c25cd-default-rtdb.firebaseio.com",
            projectId: "video-remote-c25cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vid = document.getElementById("vid");

        onValue(ref(db, 'videoStatus'), (snapshot) => {
            if (snapshot.val() === "play") vid.play();
            else vid.pause();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#111;">
    <img src="1000414313.png.png" id="btn" style="width:200px; cursor:pointer;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE THE SAME CONFIG HERE
        const firebaseConfig = { 
            apiKey: "AIzaSyAw3GOqElSQRVXODbcCduUAtn7LNu00J7w",
            databaseURL: "https://video-remote-c25cd-default-rtdb.firebaseio.com",
            projectId: "video-remote-c25cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let isPlaying = false;

        document.getElementById("btn").onclick = () => {
            isPlaying = !isPlaying;
            set(ref(db, 'videoStatus'), isPlaying ? "play" : "pause");
        };
    </script>
</body>
</html>
